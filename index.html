<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#ffffff;
  --card:#ffffff;
  --card-border:#e6e8eb;
  --card-hover:#f7f8f9;
  --text:#15171a;
  --muted:#6c7079;
  --subtle:#9ba3ae;
  --accent:#15171a;
  --hot:#c0392b;--cold:#2980b9;
  --r:12px;--rs:8px;
}

body{
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
  background:var(--bg);
  min-height:100vh;
  color:var(--text);
  line-height:1.5;
}

#app{max-width:880px;margin:0 auto;padding:24px 16px 48px}

/* ─── Loading ─── */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:20px}
.spinner{width:36px;height:36px;border:2px solid #e6e8eb;border-top-color:#15171a;border-radius:50%;animation:spin .75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading p{color:var(--muted);font-size:.9rem}

/* ─── Error ─── */
.error{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px;text-align:center}
.error-icon{font-size:2.5rem}
.error h2{font-size:1.3rem;font-weight:700}
.error p{color:var(--muted);max-width:320px;font-size:.9rem}

.btn{
  background:var(--text);border:none;border-radius:6px;color:#fff;cursor:pointer;
  font-size:.875rem;font-weight:600;padding:10px 22px;
  transition:opacity .15s;
}
.btn:hover{opacity:.8}

.hidden{display:none!important}

/* ─── Header wrapper ─── */
.hdr-wrap{position:relative;margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid var(--card-border)}

/* ─── Source toggle ─── */
.src-toggle{
  display:inline-flex;align-items:center;
  background:#f3f4f6;border:1px solid var(--card-border);
  border-radius:6px;padding:2px;margin-top:10px;gap:2px;
}
.src-btn{
  background:none;border:none;color:var(--muted);cursor:pointer;
  font-size:.72rem;font-weight:600;padding:5px 12px;border-radius:4px;
  display:flex;align-items:center;gap:5px;white-space:nowrap;
  transition:background .15s,color .15s;
}
.src-btn.active{background:#fff;color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.08)}
.src-btn:not(.active):hover{color:var(--text)}

/* ─── Default header ─── */
.hdr{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:0 2px}

.loc{
  display:flex;align-items:center;gap:10px;
  cursor:pointer;border-radius:8px;
  padding:6px 8px;margin:-6px -8px;
  transition:background .15s;min-width:0;
}
.loc:hover{background:#f3f4f6}
.loc-icon{font-size:1.2rem;flex-shrink:0}
.loc-text{min-width:0}
.loc-name{font-size:1.25rem;font-weight:700;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.loc-date{font-size:.8rem;color:var(--muted);margin-top:2px}
.loc-search-hint{
  color:var(--subtle);flex-shrink:0;
  opacity:0;transition:opacity .2s;margin-left:2px;
}
.loc:hover .loc-search-hint{opacity:1}

.toggle{
  background:#fff;border:1px solid var(--card-border);
  border-radius:6px;color:var(--text);cursor:pointer;
  font-size:.8rem;font-weight:600;padding:7px 16px;
  transition:background .15s;white-space:nowrap;flex-shrink:0;
}
.toggle:hover{background:#f3f4f6}

/* ─── Search mode header ─── */
.hdr.searching{gap:10px}
.search-bar{
  flex:1;display:flex;align-items:center;gap:10px;
  background:#fff;border:1px solid #15171a;
  border-radius:6px;padding:9px 16px;
}
.search-bar svg{color:var(--muted);flex-shrink:0}
.search-bar input{
  flex:1;background:none;border:none;outline:none;
  color:var(--text);font-size:.9rem;font-weight:500;
  min-width:0;font-family:inherit;
}
.search-bar input::placeholder{color:var(--subtle)}
.search-clear{
  background:none;border:none;color:var(--subtle);
  cursor:pointer;font-size:1rem;padding:0 2px;line-height:1;
  transition:color .15s;flex-shrink:0;
}
.search-clear:hover{color:var(--text)}
.cancel-btn{
  background:none;border:none;color:var(--text);
  cursor:pointer;font-size:.85rem;font-weight:600;
  padding:4px 0;white-space:nowrap;flex-shrink:0;
}
.cancel-btn:hover{opacity:.6}

/* ─── Search dropdown ─── */
.search-drop{
  position:absolute;top:calc(100% + 6px);
  left:0;right:0;z-index:200;
  background:#fff;
  border:1px solid var(--card-border);
  border-radius:8px;overflow:hidden;
  box-shadow:0 8px 24px rgba(0,0,0,.1);
  animation:dropIn .15s ease;
}
@keyframes dropIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}

.search-result{
  display:flex;align-items:center;justify-content:space-between;
  padding:11px 16px;cursor:pointer;gap:16px;
  transition:background .1s;
}
.search-result+.search-result{border-top:1px solid #f0f1f3}
.search-result:hover,.search-result.focused{background:#f7f8f9}
.sr-left{display:flex;align-items:center;gap:10px;min-width:0}
.sr-pin{font-size:.95rem;flex-shrink:0}
.sr-name{font-size:.9rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.sr-detail{font-size:.76rem;color:var(--muted);white-space:nowrap;flex-shrink:0}
.search-msg{padding:16px;text-align:center;color:var(--muted);font-size:.85rem}

/* ─── Hero ─── */
.hero{
  background:#f7f8f9;
  border:1px solid var(--card-border);border-radius:var(--r);
  padding:28px;margin-bottom:16px;
}
.hero-top{display:flex;justify-content:space-between;align-items:flex-start;gap:16px}
.hero-left{min-width:0}
.hero-temp{
  font-size:5rem;font-weight:800;line-height:1;letter-spacing:-3px;
  display:flex;align-items:flex-start;gap:4px;color:var(--text);
}
.hero-temp sup{font-size:1.8rem;font-weight:400;color:var(--muted);letter-spacing:0;margin-top:10px}
.hero-cond{font-size:1.05rem;font-weight:600;margin:10px 0 4px;color:var(--text)}
.hero-range{font-size:.85rem;color:var(--muted)}
.hero-range .hi{color:var(--hot)}
.hero-range .lo{color:var(--cold)}
.hero-anomaly{font-size:1.05rem;font-weight:600;color:var(--text);margin:0}
.hero-anomaly-col{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;gap:3px;padding-top:8px;min-width:0}
.hero-icon{font-size:4rem;line-height:1;flex-shrink:0;text-align:right}

.hero-stats{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:12px;margin-top:22px;padding-top:20px;
  border-top:1px solid var(--card-border);
}
.stat{display:flex;flex-direction:column;gap:3px}
.stat-ico{font-size:.9rem}
.stat-lbl{font-size:.68rem;text-transform:uppercase;letter-spacing:.07em;color:var(--muted)}
.stat-val{font-size:.95rem;font-weight:600;color:var(--text)}

/* ─── Section header ─── */
.sec-hdr{margin-bottom:10px}
.sec-ttl{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted)}
.sec-sub{font-size:.78rem;color:var(--subtle);margin-top:3px}

/* ─── Forecast grid ─── */
.fcast-grid{
  display:grid;grid-template-columns:repeat(7,1fr);
  gap:6px;margin-bottom:20px;
}
@media(max-width:580px){
  .fcast-grid{display:flex;overflow-x:auto;padding-bottom:8px;scrollbar-width:none}
  .fcast-grid::-webkit-scrollbar{display:none}
  .fc{min-width:76px}
}
.fc{
  background:#f7f8f9;
  border:1px solid var(--card-border);border-radius:var(--rs);
  padding:12px 6px;text-align:center;
  transition:background .15s;cursor:default;
}
.fc:hover{background:#f0f1f3}
.fc.today{background:#fff;border-color:#15171a;}
.fc-day{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:7px}
.fc.today .fc-day{color:var(--text)}
.fc-ico{font-size:1.4rem;display:block;margin:2px 0}
.fc-hi{font-size:.85rem;font-weight:700;color:var(--hot);margin-top:6px}
.fc-lo{font-size:.76rem;color:var(--cold);margin-top:2px}
.fc-pop{font-size:.65rem;color:var(--subtle);margin-top:4px}

/* ─── Historical comparison ─── */
.hist{
  background:#f7f8f9;
  border:1px solid var(--card-border);border-radius:var(--r);
  padding:22px;margin-bottom:20px;
}
.legend{display:flex;gap:16px;margin-bottom:16px;flex-wrap:wrap}
.leg{display:flex;align-items:center;gap:7px;font-size:.73rem;color:var(--muted)}
.leg-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.leg-h{background:#d1d5db}
.leg-f{background:#15171a}

.cmp-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
@media(max-width:480px){.cmp-grid{grid-template-columns:1fr}}

.cmp-item{display:flex;flex-direction:column;gap:9px}
.cmp-lbl{font-size:.7rem;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);display:flex;align-items:center;gap:6px}
.cmp-rows{display:flex;flex-direction:column;gap:7px}

.bar-row{display:flex;align-items:center;gap:9px}
.bar-tag{font-size:.68rem;color:var(--subtle);width:54px;flex-shrink:0;text-align:right}
.bar-track{flex:1;height:6px;background:#e6e8eb;border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;width:0;transition:width 1.1s cubic-bezier(.4,0,.2,1)}
.bar-h{background:#9ba3ae}
.bar-f{background:#15171a}
.bar-num{font-size:.78rem;font-weight:600;width:52px;flex-shrink:0;color:var(--text)}

.delta{font-size:.68rem;padding-left:63px;margin-top:-3px}
.delta-hi{color:var(--hot)}
.delta-lo{color:var(--cold)}
.delta-eq{color:var(--subtle)}

/* ─── Empty / search-first state ─── */
.empty-state{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:80px 20px 40px;gap:14px;text-align:center;
}
.empty-ico{font-size:3rem}
.empty-title{font-size:1rem;font-weight:600;color:var(--text)}
.empty-sub{font-size:.83rem;color:var(--muted);max-width:260px}

/* ─── Footer ─── */
.footer{text-align:center;margin-top:40px;padding-top:20px;border-top:1px solid var(--card-border)}
.footer p{font-size:.74rem;color:var(--subtle)}
.footer a{color:var(--text);text-decoration:underline;text-underline-offset:2px}
.footer a:hover{opacity:.6}

/* ─── Animations ─── */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fu{opacity:0;animation:fadeUp .35s ease forwards}
.fu:nth-child(1){animation-delay:.04s}
.fu:nth-child(2){animation-delay:.1s}
.fu:nth-child(3){animation-delay:.16s}
.fu:nth-child(4){animation-delay:.22s}
.fu:nth-child(5){animation-delay:.28s}

/* ─── Responsive ─── */
@media(max-width:600px){
  #app{padding:16px 12px 40px}
  .hdr-wrap{margin-bottom:20px;padding-bottom:16px}
  .hero{padding:20px 16px}
  .hero-temp{font-size:4rem;letter-spacing:-2px}
  .hero-icon{font-size:3.2rem}
  .hero-cond{font-size:.95rem}
  .chart-card{padding:16px 14px 6px}
  .hist{padding:16px}
}

@media(max-width:480px){
  .loc-name{font-size:1.05rem}
  .toggle{font-size:.75rem;padding:6px 10px}
  .hero{padding:18px 14px}
  .hero-temp{font-size:3.5rem;letter-spacing:-2px}
  .hero-icon{font-size:2.8rem}
  .hero-stats{gap:8px;margin-top:16px;padding-top:14px}
  .stat-val{font-size:.88rem}
  .sec-hdr{margin-bottom:8px}
  .chart-card{padding:14px 12px 4px}
  .chart-leg{gap:10px}
}

@media(max-width:380px){
  .hdr{flex-wrap:wrap;gap:8px}
  .toggle{width:100%;text-align:center}
  .hero-temp{font-size:3rem}
  .hero-icon{font-size:2.4rem}
  .hero-stats{grid-template-columns:1fr 1fr;gap:10px}
  .hero-stats .stat:last-child{grid-column:1/-1}
}

/* ─── Charts ─── */
.wc-svg{width:100%;display:block;overflow:visible}
.cg{stroke:#e6e8eb;stroke-width:1;fill:none}
.ca{font-size:10px;fill:#9ba3ae;font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
.cv{font-size:9px;font-weight:700;font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
.cv-hot{fill:var(--hot)}
.cv-cold{fill:var(--cold)}
.cl{fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.cl-hot{stroke:var(--hot)}
.cl-cold{stroke:var(--cold)}
.ch-band{fill:#e6e8eb}
.cb-bar{fill:#6c7079}
.ch-avg-line{stroke:#9ba3ae;stroke-width:1.5;stroke-dasharray:5,4}
.cl-ytd-cur{stroke:rgba(102,126,234,1);stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
.cl-ytd-hist{stroke:#9ba3ae;stroke-width:1.5;stroke-dasharray:6,4;fill:none;stroke-linecap:round;stroke-linejoin:round}
.chart-card{
  background:#f7f8f9;
  border:1px solid var(--card-border);border-radius:var(--r);
  padding:20px 20px 8px;margin-bottom:16px;
}
.chart-leg{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:10px}
.cli{display:flex;align-items:center;gap:6px;font-size:.7rem;color:var(--muted)}

/* ─── Tooltip ─── */
.tt{
  position:fixed;z-index:900;
  background:#fff;border:1px solid var(--card-border);
  border-radius:8px;padding:10px 14px;pointer-events:none;
  font-size:.75rem;line-height:1.75;
  box-shadow:0 4px 16px rgba(0,0,0,.1);
  min-width:150px;opacity:1;transition:opacity .1s;
}
.tt.hidden{opacity:0}
.tt-title{font-weight:700;color:var(--text);margin-bottom:3px;font-size:.78rem}
.tt-row{display:flex;justify-content:space-between;gap:14px}
.tt-lbl{color:var(--muted)}
.tt-hot{color:var(--hot);font-weight:600}
.tt-cold{color:var(--cold);font-weight:600}
.tt-cur{color:#15171a;font-weight:600}
.tt-muted{color:var(--muted);font-weight:600}
.tt-pos{color:var(--hot);font-weight:600}
.tt-neg{color:var(--cold);font-weight:600}
</style>
</head>
<body>
<div id="app">
  <div id="tt" class="tt hidden"></div>
  <div id="loading" class="loading">
    <div class="spinner"></div>
    <p id="load-msg">Getting your location…</p>
  </div>
  <div id="error" class="error hidden">
    <div class="error-icon">⚠️</div>
    <h2>Couldn't load weather</h2>
    <p id="err-msg">Something went wrong.</p>
    <button class="btn" onclick="init()">Try Again</button>
  </div>
  <div id="main" class="hidden">
    <div class="hdr-wrap">
      <div id="app-hdr"></div>
      <div id="search-drop" class="search-drop hidden"></div>
    </div>
    <div id="content"></div>
  </div>
</div>

<script>
const WMO={
  0:{l:'Clear Sky',i:'☀️'},1:{l:'Mainly Clear',i:'🌤️'},2:{l:'Partly Cloudy',i:'⛅'},3:{l:'Overcast',i:'☁️'},
  45:{l:'Foggy',i:'🌫️'},48:{l:'Icy Fog',i:'🌫️'},
  51:{l:'Light Drizzle',i:'🌦️'},53:{l:'Drizzle',i:'🌦️'},55:{l:'Heavy Drizzle',i:'🌧️'},
  56:{l:'Light Freezing Drizzle',i:'🌨️'},57:{l:'Freezing Drizzle',i:'🌨️'},
  61:{l:'Light Rain',i:'🌧️'},63:{l:'Rain',i:'🌧️'},65:{l:'Heavy Rain',i:'🌧️'},
  66:{l:'Light Freezing Rain',i:'🌨️'},67:{l:'Freezing Rain',i:'🌨️'},
  71:{l:'Light Snow',i:'🌨️'},73:{l:'Snow',i:'❄️'},75:{l:'Heavy Snow',i:'❄️'},77:{l:'Snow Grains',i:'🌨️'},
  80:{l:'Light Showers',i:'🌦️'},81:{l:'Showers',i:'🌧️'},82:{l:'Heavy Showers',i:'⛈️'},
  85:{l:'Snow Showers',i:'🌨️'},86:{l:'Heavy Snow Showers',i:'🌨️'},
  95:{l:'Thunderstorm',i:'⛈️'},96:{l:'Thunderstorm & Hail',i:'⛈️'},99:{l:'Thunderstorm & Heavy Hail',i:'⛈️'}
};
function wmo(c){return WMO[c]||WMO[Math.floor(c/10)*10]||{l:'Unknown',i:'🌡️'}}

// ── State ──────────────────────────────────────────────
let imp=false, fcData, histData, geoName;
let searching=false, searchResults=[], searchFocusIdx=-1, searchTimer=null;
// Source tracking
let myLat=null, myLon=null, myName=null;       // GPS location
let customLat=null, customLon=null, customName=null; // searched location
let activeSource='geo'; // 'geo' | 'custom'
let ytdData=null, hourlyHistData=null, hourlyRainHistData=null, dailyRainHistData=null, climatologyData=null, hourlyHumidData=null;
let _tempData=null,_rainData=null,_hourlyData=null,_hourlyRainData=null,_dailyRainData=null,_climateData=null,_hourlyHumidData=null,_dailyHumidData=null;

// ── Unit helpers ───────────────────────────────────────
const c2f=c=>c*9/5+32, k2m=k=>k*.621371, mm2in=m=>m*.0393701;
function fT(c){if(c==null)return'—';return imp?`${Math.round(c2f(c))}°F`:`${Math.round(c)}°C`}
function fTn(c){if(c==null)return'—';return imp?Math.round(c2f(c)):Math.round(c)}
function fW(k){if(k==null)return'—';return imp?`${Math.round(k2m(k))} mph`:`${Math.round(k)} km/h`}
function fP(m){if(m==null)return'—';return imp?`${mm2in(m).toFixed(2)}"`:`${(+m).toFixed(1)} mm`}
function nT(c){return imp?c2f(c):c}
function nW(k){return imp?k2m(k):k}
function nP(m){return imp?mm2in(m):m}
function uT(){return imp?'°F':'°C'}
function fDate(d){return d.toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}
function fDay(s){return new Date(s+'T12:00:00').toLocaleDateString('en-US',{weekday:'short'})}
function avg(arr,idx){
  const v=(idx?idx.map(i=>arr[i]):arr).filter(x=>x!=null&&!isNaN(x));
  return v.length?v.reduce((a,b)=>a+b,0)/v.length:null;
}

// ── Search ─────────────────────────────────────────────
const ICON_SEARCH=`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>`;

function openSearch(){
  searching=true; searchResults=[]; searchFocusIdx=-1;
  renderHeader();
  requestAnimationFrame(()=>{
    const inp=document.getElementById('srch');
    if(inp) inp.focus();
  });
}

function closeSearch(){
  searching=false; searchResults=[]; searchFocusIdx=-1;
  clearTimeout(searchTimer);
  document.getElementById('search-drop').classList.add('hidden');
  renderHeader();
}

function clearInput(){
  const inp=document.getElementById('srch');
  if(inp){inp.value='';inp.focus();}
  searchResults=[]; searchFocusIdx=-1;
  document.getElementById('search-drop').classList.add('hidden');
}

function onSearchInput(val){
  searchFocusIdx=-1;
  clearTimeout(searchTimer);
  const drop=document.getElementById('search-drop');
  if(!val.trim()){searchResults=[];drop.classList.add('hidden');return;}
  drop.classList.remove('hidden');
  drop.innerHTML='<p class="search-msg">Searching…</p>';
  searchTimer=setTimeout(()=>doSearch(val),300);
}

async function doSearch(query){
  try{
    const r=await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(query)}&count=6&language=en&format=json`);
    if(!r.ok) throw 0;
    const data=await r.json();
    searchResults=data.results||[];
    renderDrop();
  }catch{
    document.getElementById('search-drop').innerHTML='<p class="search-msg">Search failed — check your connection.</p>';
  }
}

function renderDrop(){
  const drop=document.getElementById('search-drop');
  const inp=document.getElementById('srch');
  if(!drop) return;
  if(!searchResults.length){
    drop.innerHTML=`<p class="search-msg">No results for "${inp?inp.value:''}"</p>`;
    return;
  }
  drop.innerHTML=searchResults.map((r,i)=>{
    const detail=[r.admin1,r.country_code].filter(Boolean).join(', ');
    const focused=i===searchFocusIdx?'focused':'';
    return`<div class="search-result ${focused}" data-idx="${i}">
      <div class="sr-left"><span class="sr-pin">📍</span><span class="sr-name">${r.name}</span></div>
      <span class="sr-detail">${detail}</span>
    </div>`;
  }).join('');
  drop.onclick=e=>{
    const row=e.target.closest('.search-result');
    if(!row) return;
    const r=searchResults[+row.dataset.idx];
    if(r) pickResult(r.latitude,r.longitude,`${r.name}${r.admin1?', '+r.admin1:''}${r.country?', '+r.country:''}`);
  };
}

function onSearchKey(e){
  if(e.key==='Escape'){closeSearch();return;}
  if(e.key==='ArrowDown'){
    e.preventDefault();
    searchFocusIdx=Math.min(searchFocusIdx+1,searchResults.length-1);
    renderDrop(); return;
  }
  if(e.key==='ArrowUp'){
    e.preventDefault();
    searchFocusIdx=Math.max(searchFocusIdx-1,0);
    renderDrop(); return;
  }
  if(e.key==='Enter'&&searchFocusIdx>=0&&searchResults[searchFocusIdx]){
    const r=searchResults[searchFocusIdx];
    pickResult(r.latitude,r.longitude,`${r.name}${r.admin1?', '+r.admin1:''}${r.country?', '+r.country:''}`);
  }
}

// Fire the non-blocking secondary fetches: YTD rainfall (1 req) + merged hourly
// normals (5 reqs). Kept small so we stay well under Open-Meteo's rate limit.
function loadBackground(lat,lon){
  getRainYTD(lat,lon).then(ytd=>{ytdData=ytd;if(fcData)renderContent();}).catch(()=>{});
  getHourlyNormals(lat,lon).then(d=>{
    hourlyHistData=d.temp; hourlyRainHistData=d.rain; hourlyHumidData=d.humidity;
    if(fcData)renderContent();
  }).catch(()=>{});
}

async function pickResult(lat,lon,name){
  closeSearch();
  customLat=lat; customLon=lon; customName=name;
  activeSource='custom'; geoName=name;
  renderHeader(); setLoad('Loading weather…');
  ytdData=null; hourlyHistData=null; hourlyRainHistData=null; dailyRainHistData=null; climatologyData=null; hourlyHumidData=null;
  try{
    const[fc,climate]=await Promise.all([getForecast(lat,lon),getClimatology(lat,lon)]);
    fcData=fc; climatologyData=climate;
    histData=deriveTempBand(climate); dailyRainHistData=deriveDailyRain(climate);
    renderContent();
    document.getElementById('main').classList.remove('hidden');
    document.getElementById('loading').classList.add('hidden');
  }catch(e){showErr(e.message||'Failed to load weather.');return;}
  loadBackground(lat,lon);
}

async function switchSource(src){
  if(activeSource===src) return;
  const lat=src==='geo'?myLat:customLat;
  const lon=src==='geo'?myLon:customLon;
  const name=src==='geo'?myName:customName;
  if(lat==null) return;
  activeSource=src; geoName=name;
  renderHeader();
  setLoad('Loading weather…');
  ytdData=null; hourlyHistData=null; hourlyRainHistData=null; dailyRainHistData=null; climatologyData=null; hourlyHumidData=null;
  try{
    const[fc,climate]=await Promise.all([getForecast(lat,lon),getClimatology(lat,lon)]);
    fcData=fc; climatologyData=climate;
    histData=deriveTempBand(climate); dailyRainHistData=deriveDailyRain(climate);
    renderContent();
    document.getElementById('main').classList.remove('hidden');
    document.getElementById('loading').classList.add('hidden');
  }catch(e){showErr(e.message||'Failed to load weather.');return;}
  loadBackground(lat,lon);
}

function makeTempChart(){
  if(!fcData||!histData) return '';
  const d=fcData.daily;
  // Find today's index in the 14-day array (past_days:7 + forecast_days:7)
  const todayStr=new Date().toISOString().slice(0,10);
  const todayIdx=Math.max(0,d.time.findIndex(t=>t===todayStr));
  const labels=d.time.map((t,i)=>i===todayIdx?'Today':fDay(t));
  const maxV=d.temperature_2m_max.map(v=>v!=null?nT(v):null);
  const minV=d.temperature_2m_min.map(v=>v!=null?nT(v):null);
  const dailyAvg=histData.dailyAvg||[];
  const bandMaxes=dailyAvg.map(a=>a.tMax!=null?nT(a.tMax):null).filter(v=>v!=null);
  const bandMins=dailyAvg.map(a=>a.tMin!=null?nT(a.tMin):null).filter(v=>v!=null);
  const allV=[...maxV,...minV,...bandMaxes,...bandMins].filter(v=>v!=null&&!isNaN(v));
  if(!allV.length) return '';
  const lo=Math.floor(Math.min(...allV))-2;
  const hi=Math.ceil(Math.max(...allV))+2;
  const W=580,H=210,pL=46,pR=14,pT=24,pB=38;
  const cW=W-pL-pR,cH=H-pT-pB;
  const n=labels.length;
  const xf=i=>pL+i/(n-1)*cW;
  const yf=v=>pT+(1-(v-lo)/(hi-lo))*cH;
  const rng=hi-lo;
  const rawStep=rng/4;
  const mag=Math.pow(10,Math.floor(Math.log10(rawStep||1)));
  const tickStep=[1,2,5,10].map(s=>s*mag).find(s=>rng/s<=6)||Math.ceil(rawStep);
  const ticks=[];
  for(let v=Math.ceil(lo/tickStep)*tickStep;v<=hi;v+=tickStep){
    const y=yf(v).toFixed(1);
    ticks.push(`<line x1="${pL}" y1="${y}" x2="${W-pR}" y2="${y}" class="cg"/>` +
      `<text x="${pL-5}" y="${+y+4}" class="ca" text-anchor="end">${v}°</text>`);
  }
  // Rolling-average band — polygon whose edges follow per-day ±3-day avg highs and lows
  const band=(()=>{
    if(!dailyAvg.length) return '';
    const topPts=dailyAvg.map((a,i)=>a.tMax!=null?`${xf(i).toFixed(1)},${yf(nT(a.tMax)).toFixed(1)}`:null).filter(Boolean);
    const botPts=dailyAvg.map((a,i)=>a.tMin!=null?`${xf(i).toFixed(1)},${yf(nT(a.tMin)).toFixed(1)}`:null).filter(Boolean);
    if(!topPts.length||!botPts.length) return '';
    const poly=[...topPts,...[...botPts].reverse()].join(' ');
    // Label near left edge, vertically centred on the band at the first data point
    const f=dailyAvg[0];
    const lblY=f.tMax!=null&&f.tMin!=null?((yf(nT(f.tMax))+yf(nT(f.tMin)))/2).toFixed(1):null;
    const lbl=lblY?`<text x="${pL+4}" y="${(+lblY+4).toFixed(1)}" font-size="8.5" fill="#9ba3ae" opacity="0.8">Hist. avg</text>`:'';
    return `<polygon points="${poly}" class="ch-band"/>${lbl}`;
  })();
  // Vertical "Today" divider
  const todayX=xf(todayIdx).toFixed(1);
  const todayMark=`<line x1="${todayX}" y1="${pT}" x2="${todayX}" y2="${(pT+cH).toFixed(1)}" stroke="#9ba3ae" stroke-width="1" stroke-dasharray="3,3" opacity="0.7"/>` +
    `<text x="${todayX}" y="${pT-4}" font-size="8" font-weight="700" fill="#9ba3ae" text-anchor="middle">Today</text>`;
  // Lines: past segment (dashed, index 0..todayIdx inclusive for continuity) and forecast segment (solid)
  const pastMxPts=maxV.slice(0,todayIdx+1).map((v,i)=>`${xf(i).toFixed(1)},${yf(v??lo).toFixed(1)}`).join(' ');
  const pastMnPts=minV.slice(0,todayIdx+1).map((v,i)=>`${xf(i).toFixed(1)},${yf(v??lo).toFixed(1)}`).join(' ');
  const fcstMxPts=maxV.slice(todayIdx).map((v,i)=>`${xf(todayIdx+i).toFixed(1)},${yf(v??lo).toFixed(1)}`).join(' ');
  const fcstMnPts=minV.slice(todayIdx).map((v,i)=>`${xf(todayIdx+i).toFixed(1)},${yf(v??lo).toFixed(1)}`).join(' ');
  // Dots: lighter/smaller for past, normal for forecast; value labels only on forecast
  const mxDots=maxV.map((v,i)=>{
    if(v==null) return '';
    const cx=xf(i).toFixed(1),cy=yf(v).toFixed(1);
    const isPast=i<todayIdx;
    const fill=isPast?'rgba(255,123,123,0.45)':'#ff7b7b';
    const lbl=!isPast?`<text x="${cx}" y="${(yf(v)-9).toFixed(1)}" class="cv cv-hot" text-anchor="middle">${Math.round(v)}°</text>`:'';
    return `<circle cx="${cx}" cy="${cy}" r="${isPast?2.8:3.5}" fill="${fill}" stroke="rgba(15,12,41,.9)" stroke-width="1.5"/>${lbl}`;
  }).join('');
  const mnDots=minV.map((v,i)=>{
    if(v==null) return '';
    const cx=xf(i).toFixed(1),cy=yf(v).toFixed(1);
    const isPast=i<todayIdx;
    const fill=isPast?'rgba(116,192,252,0.45)':'#74c0fc';
    const lbl=!isPast?`<text x="${cx}" y="${(yf(v)+15).toFixed(1)}" class="cv cv-cold" text-anchor="middle">${Math.round(v)}°</text>`:'';
    return `<circle cx="${cx}" cy="${cy}" r="${isPast?2.8:3.5}" fill="${fill}" stroke="rgba(15,12,41,.9)" stroke-width="1.5"/>${lbl}`;
  }).join('');
  const xLbls=labels.map((l,i)=>`<text x="${xf(i).toFixed(1)}" y="${H-6}" class="ca" text-anchor="middle">${l}</text>`).join('');
  _tempData={labels,maxV,minV,dailyAvg,pL,cW,n,todayIdx};
  return `<svg viewBox="0 0 ${W} ${H}" class="wc-svg" data-chart="temp">
    ${ticks.join('')}
    ${band}
    ${todayMark}
    <line id="ttg-temp" x1="${pL}" y1="${pT}" x2="${pL}" y2="${(pT+cH).toFixed(1)}" stroke="rgba(255,255,255,.18)" stroke-width="1" stroke-dasharray="3,3" visibility="hidden"/>
    <polyline points="${pastMxPts}" class="cl cl-hot" stroke-dasharray="5,4" opacity="0.55"/>
    <polyline points="${pastMnPts}" class="cl cl-cold" stroke-dasharray="5,4" opacity="0.55"/>
    <polyline points="${fcstMxPts}" class="cl cl-hot"/>
    <polyline points="${fcstMnPts}" class="cl cl-cold"/>
    ${mxDots}${mnDots}
    ${(()=>{
      const hv=maxV[n-1],lv=minV[n-1];
      if(hv==null||lv==null) return '';
      const lx=(xf(n-1)+5).toFixed(1);
      return `<text x="${lx}" y="${(yf(hv)+4).toFixed(1)}" font-size="9" font-weight="700" fill="#c0392b">High</text>` +
             `<text x="${lx}" y="${(yf(lv)+4).toFixed(1)}" font-size="9" font-weight="700" fill="#2980b9">Low</text>`;
    })()}
    ${xLbls}
  </svg>`;
}

function makeRainYTDChart(){
  if(!ytdData) return '<p class="search-msg" style="padding:24px 0">⏳ Loading year-to-date rainfall…</p>';
  const{labels,cumCurrentYear,cumHistAvg,thisYear}=ytdData;
  const n=labels.length;
  if(!n) return '';
  // Build 7-day forecast extension (days strictly after the last archive date)
  const fcstExtCum=[], fcstDates=[];
  if(fcData?.daily){
    const fd=fcData.daily;
    const si=fd.time.findIndex(t=>t>ytdData.latestDate);
    if(si>=0){
      let cum=cumCurrentYear[n-1];
      fd.time.slice(si,si+7).forEach((date,j)=>{
        cum+=(fd.precipitation_sum[si+j]??0);
        fcstExtCum.push(cum);
        fcstDates.push(date);
      });
    }
  }
  const numFc=fcstExtCum.length;
  const totalN=n+numFc;
  const curV=cumCurrentYear.map(nP);
  const avgV=cumHistAvg.map(nP);
  const fcV=fcstExtCum.map(nP);
  const avgExtV=(ytdData.cumHistAvgExt||[]).slice(0,numFc).map(nP);
  const W=580,H=222,pL=52,pR=14,pT=20,pB=36;
  const cW=W-pL-pR,cH=H-pT-pB;
  const yMax=Math.max(...curV,...avgV,...(fcV.length?fcV:[0]),...(avgExtV.length?avgExtV:[0]),.01)*1.1;
  // x maps over the full totalN range so forecast extends naturally to the right
  const xf=i=>pL+(i/Math.max(totalN-1,1))*cW;
  const yf=v=>pT+(1-v/yMax)*cH;
  // Nice Y-axis ticks
  const niceSteps=imp?[0.1,0.25,0.5,1,2,5,10,20,25,50]:[1,2,5,10,20,25,50,100,200,250,500];
  const rawStep=yMax/4;
  const tickStep=niceSteps.find(s=>s>=rawStep*0.7)||Math.ceil(rawStep);
  const fmtY=v=>imp?(v<1?v.toFixed(1):Math.round(v))+'"':(v<10?v.toFixed(0):Math.round(v))+'mm';
  const ticks=[];
  for(let v=0;v<=yMax*1.05;v+=tickStep){
    const y=yf(v).toFixed(1);
    ticks.push(`<line x1="${pL}" y1="${y}" x2="${W-pR}" y2="${y}" class="cg"/>` +
      `<text x="${pL-5}" y="${+y+4}" class="ca" text-anchor="end">${fmtY(v)}</text>`);
  }
  // Month boundary markers (based on YTD labels only)
  const monthMarks=[];
  let lastMo=-1;
  labels.forEach((mmdd,i)=>{
    const mo=+mmdd.slice(0,2);
    if(mo!==lastMo){
      monthMarks.push({i,label:new Date(thisYear,mo-1,1).toLocaleString('en-US',{month:'short'})});
      lastMo=mo;
    }
  });
  const xGrid=monthMarks.slice(1).map(m=>`<line x1="${xf(m.i).toFixed(1)}" y1="${pT}" x2="${xf(m.i).toFixed(1)}" y2="${pT+cH}" class="cg"/>`).join('');
  const xLabels=monthMarks.map(m=>`<text x="${xf(m.i).toFixed(1)}" y="${H-4}" class="ca" text-anchor="middle">${m.label}</text>`).join('');
  const curPts=curV.map((v,i)=>`${xf(i).toFixed(1)},${yf(v).toFixed(1)}`).join(' ');
  const avgPts=avgV.map((v,i)=>`${xf(i).toFixed(1)},${yf(v).toFixed(1)}`).join(' ');
  // "Today" divider at the point where actual data ends and forecast begins
  const rainTodayX=xf(n-1).toFixed(1);
  const rainTodayMark=numFc>0?`<line x1="${rainTodayX}" y1="${pT}" x2="${rainTodayX}" y2="${(pT+cH).toFixed(1)}" stroke="#9ba3ae" stroke-width="1" stroke-dasharray="3,3" opacity="0.7"/>` +
    `<text x="${rainTodayX}" y="${pT-4}" font-size="8" font-weight="700" fill="#9ba3ae" text-anchor="middle">Today</text>`:''  ;
  // Historical avg extension — connects from last avg point into forecast window
  const avgExtPts=avgExtV.length?[
    `${xf(n-1).toFixed(1)},${yf(avgV[n-1]).toFixed(1)}`,
    ...avgExtV.map((v,i)=>`${xf(n+i).toFixed(1)},${yf(v).toFixed(1)}`)
  ].join(' '):'';
  // Forecast polyline starts at the last actual point for a smooth join
  const fcstPts=fcV.length?[
    `${xf(n-1).toFixed(1)},${yf(curV[n-1]).toFixed(1)}`,
    ...fcV.map((v,i)=>`${xf(n+i).toFixed(1)},${yf(v).toFixed(1)}`)
  ].join(' '):'';
  // End dot and end labels (replacing legend)
  const lx=xf(totalN-1).toFixed(1);
  const endCurY=yf(fcV.length?fcV[fcV.length-1]:curV[n-1]);
  const endAvgY=yf(avgExtV.length?avgExtV[avgExtV.length-1]:avgV[n-1]);
  const ly=endCurY.toFixed(1);
  // Separate labels if they're too close vertically
  const _rSep=endCurY-endAvgY;
  let _ryCur=endCurY, _ryAvg=endAvgY;
  if(Math.abs(_rSep)<13){const bump=(13-Math.abs(_rSep))/2+1;_ryCur+=_rSep>=0?bump:-bump;_ryAvg+=_rSep>=0?-bump:bump;}
  const endLabels=`<text x="${+lx+5}" y="${(_ryCur+4).toFixed(1)}" font-size="8.5" font-weight="700" fill="rgba(102,126,234,1)" text-anchor="start">${thisYear}</text>` +
    `<text x="${+lx+5}" y="${(_ryAvg+4).toFixed(1)}" font-size="8.5" fill="#9ba3ae" text-anchor="start">Hist. avg</text>`;
  _rainData={labels,curV,avgV,thisYear,pL,cW,n,fcV,numFc,totalN,fcstDates};
  return `<svg viewBox="0 0 ${W} ${H}" class="wc-svg" data-chart="rain">
    ${ticks.join('')}
    ${xGrid}
    <line id="ttg-rain" x1="${pL}" y1="${pT}" x2="${pL}" y2="${(pT+cH).toFixed(1)}" stroke="rgba(255,255,255,.18)" stroke-width="1" stroke-dasharray="3,3" visibility="hidden"/>
    ${rainTodayMark}
    <polyline points="${avgPts}" class="cl-ytd-hist"/>
    ${avgExtPts?`<polyline points="${avgExtPts}" class="cl-ytd-hist"/>`:''}
    <polyline points="${curPts}" class="cl-ytd-cur"/>
    ${fcstPts?`<polyline points="${fcstPts}" stroke="rgba(102,126,234,.9)" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="5,4"/>`:''}
    <circle cx="${lx}" cy="${ly}" r="4" fill="rgba(102,126,234,.9)" stroke="rgba(15,12,41,.9)" stroke-width="1.5"/>
    ${endLabels}
    ${xLabels}
  </svg>`;
}

// ── Render weather content ─────────────────────────────
function uvLabel(u){
  if(u==null)return'—';
  return`${u.toFixed(1)} ${u<=2?'Low':u<=5?'Moderate':u<=7?'High':u<=10?'Very High':'Extreme'}`;
}
function glowColor(code){
  if(code===0||code===1)return'rgba(255,210,80,.45)';
  if(code===2||code===3)return'rgba(140,170,220,.3)';
  if(code>=95)return'rgba(120,80,255,.4)';
  if(code>=71)return'rgba(190,225,255,.3)';
  if(code>=51)return'rgba(60,140,255,.35)';
  return'rgba(102,126,234,.35)';
}
function barHtml(histVal,fcstVal,fmtFn,numFn){
  const h=histVal!=null?numFn(histVal):0;
  const f=fcstVal!=null?numFn(fcstVal):0;
  const mx=Math.max(h,f,.001);
  const hw=Math.round(h/mx*100), fw=Math.round(f/mx*100);
  let delta='';
  if(histVal!=null&&fcstVal!=null){
    const diff=numFn(fcstVal)-numFn(histVal);
    if(Math.abs(diff)<0.4) delta=`<p class="delta delta-eq">≈ near historical average</p>`;
    else{
      const sign=diff>0?'+':'−', abs=Math.abs(diff), val=abs<1?abs.toFixed(1):Math.round(abs);
      delta=`<p class="delta ${diff>0?'delta-hi':'delta-lo'}">${sign}${val} vs historical avg</p>`;
    }
  }
  return`<div class="bar-row">
    <span class="bar-tag">Hist.</span>
    <div class="bar-track"><div class="bar-fill bar-h" data-w="${hw}%"></div></div>
    <span class="bar-num">${histVal!=null?fmtFn(histVal):'—'}</span>
  </div>
  <div class="bar-row">
    <span class="bar-tag">Forecast</span>
    <div class="bar-track"><div class="bar-fill bar-f" data-w="${fw}%"></div></div>
    <span class="bar-num">${fcstVal!=null?fmtFn(fcstVal):'—'}</span>
  </div>${delta}`;
}

function renderContent(){
  if(!fcData||!histData) return;
  const d=fcData.daily, h=histData;
  // With past_days:7 the array starts 7 days ago — find today's index
  const _todayStr=new Date().toISOString().slice(0,10);
  const t0=Math.max(0,d.time.findIndex(t=>t===_todayStr));
  const w0=wmo(d.weather_code[t0]);
  const tMax0=d.temperature_2m_max[t0], tMin0=d.temperature_2m_min[t0];
  // Current hour from hourly data
  const _pad=n=>String(n).padStart(2,'0');
  const _nowHourStr=`${_todayStr}T${_pad(new Date().getHours())}:00`;
  const _nowHourIdx=Math.max(0,(fcData.hourly?.time||[]).findIndex(t=>t>=_nowHourStr));
  const tNow=fcData.hourly?.temperature_2m?.[_nowHourIdx]??tMax0;
  const app0=fcData.hourly?.apparent_temperature?.[_nowHourIdx]??d.apparent_temperature_max[t0];
  const pop0=d.precipitation_probability_max[t0];
  const wind0=d.wind_speed_10m_max[t0];
  const uv0=d.uv_index_max[t0];
  const ytdYear=ytdData?.thisYear||new Date().getFullYear();
  const ytdStart=ytdData?.startYear||2000;
  const ytdThrough=ytdData?.latestDate?ytdData.latestDate.slice(5).replace('-','/'):'';
  // Short location name (city only, before first comma)
  const _loc=geoName?.split(',')[0]?.trim()||'';
  const _locFor=_loc?` for ${_loc}`:'';
  // Chart subtitles
  const subHourly=`Hourly temperature${_locFor} · actual & forecast vs ${hourlyHistData?`${hourlyHistData.yearStart}–${hourlyHistData.yearEnd} avg`:'historical avg'}`;
  const subDaily=`14-day high/low${_locFor} · vs 7-day rolling avg ${h.histYearStart}–${h.histYearEnd}`;
  const _thisYr=new Date().getFullYear();

// ── API calls ──────────────────────────────────────────
// Throttled archive fetcher — Open-Meteo rate-limits bursts (HTTP 429),
// so cap concurrency and retry with backoff. Keeps load light & reliable.
const _archiveQueue=[]; let _archiveActive=0; const ARCHIVE_MAX=3;
function archiveFetch(url){
  return new Promise((resolve,reject)=>{
    _archiveQueue.push({url,resolve,reject,tries:0});
    _drainArchive();
  });
}
function _drainArchive(){
  while(_archiveActive<ARCHIVE_MAX && _archiveQueue.length){
    const job=_archiveQueue.shift();
    _archiveActive++;
    fetch(job.url).then(r=>{
      if(r.status===429 && job.tries<4){
        job.tries++;
        const delay=400*Math.pow(2,job.tries); // 800, 1600, 3200, 6400ms
        setTimeout(()=>{_archiveQueue.unshift(job);_drainArchive();},delay);
      } else {
        job.resolve(r);
      }
    }).catch(job.reject).finally(()=>{
      _archiveActive--;
      _drainArchive();
    });
  }
}

async function getPos(){
  return new Promise((res,rej)=>{
    if(!navigator.geolocation)return rej(new Error('Geolocation not supported by this browser.'));
    navigator.geolocation.getCurrentPosition(res,e=>{
      rej(new Error(
        e.code===e.PERMISSION_DENIED?'Location access denied. Please allow location in your browser settings.':
        e.code===e.POSITION_UNAVAILABLE?'Location unavailable.':'Location request timed out.'
      ));
    },{timeout:15000,maximumAge:300000});
  });
}

async function geocode(lat,lon){
  try{
    const r=await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`,
      {headers:{'Accept-Language':'en'}});
    if(!r.ok) throw 0;
    const d=await r.json(), a=d.address||{};
    const city=a.city||a.town||a.village||a.municipality||a.county||'';
    const region=a.state||a.country||'';
    return city?`${city}${region?', '+region:''}`:`${lat.toFixed(2)}, ${lon.toFixed(2)}`;
  }catch{return`${lat.toFixed(2)}, ${lon.toFixed(2)}`}
}

async function getForecast(lat,lon){

    daily:'weather_code,temperature_2m_max,temperature_2m_min,apparent_temperature_max,precipitation_sum,precipitation_probability_max,wind_speed_10m_max,uv_index_max',

  return r.json();
}

async function getRainYTD(lat,lon){
  const now=new Date();
  const thisYear=now.getFullYear();
  const pad=n=>String(n).padStart(2,'0');
  const todayStr=`${thisYear}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;
  const startYear=2000;
  const p=new URLSearchParams({
    latitude:lat,longitude:lon,timezone:'auto',
    start_date:`${startYear}-01-01`,end_date:todayStr,
    daily:'precipitation_sum'
  });
  const r=await archiveFetch(`https://archive-api.open-meteo.com/v1/archive?${p}`);
  if(!r.ok) throw new Error('YTD API error.');
  const data=await r.json();
  // Group by year -> MM-DD -> precip value
  const byYear={};
  data.daily.time.forEach((t,i)=>{
    const yr=+t.slice(0,4), mmdd=t.slice(5);
    if(!byYear[yr]) byYear[yr]={};
    byYear[yr][mmdd]=data.daily.precipitation_sum[i]??0;
  });
  // Build MM-DD labels from Jan 1 to today
  const labels=[];
  const d=new Date(thisYear,0,1);
  while(d<=now){
    labels.push(`${pad(d.getMonth()+1)}-${pad(d.getDate())}`);
    d.setDate(d.getDate()+1);
  }
  // Current year running cumulative
  const curData=byYear[thisYear]||{};
  let s=0;
  const cumCurrentYear=labels.map(mmdd=>{s+=curData[mmdd]||0;return s;});
  // Historical average running cumulative
  const histYears=Object.keys(byYear).map(Number).filter(y=>y>=startYear&&y<thisYear);
  const histCumByYear={};
  histYears.forEach(y=>{
    let hs=0;
    histCumByYear[y]=labels.map(mmdd=>{hs+=byYear[y][mmdd]||0;return hs;});
  });
  const cumHistAvg=labels.map((_,i)=>{
    const vals=histYears.map(y=>histCumByYear[y][i]);
    return vals.reduce((a,b)=>a+b,0)/(vals.length||1);
  });
  // latestDate = last date that actually has archive data (≤ today)
  const latestDate=data.daily.time.filter(t=>t<=todayStr).pop()||todayStr;
  // Build 7-day historical avg extension for the forecast window.
  // Uses the extended byYear data (those future MM-DD values now exist for historical years).
  const latestDateObj=new Date(latestDate+'T12:00:00');
  let extCum=cumHistAvg[cumHistAvg.length-1];
  const cumHistAvgExt=[];
  for(let k=1;k<=7;k++){
    const tmp=new Date(latestDateObj); tmp.setDate(tmp.getDate()+k);
    if(tmp.getFullYear()>thisYear) break;
    const mmdd=`${pad(tmp.getMonth()+1)}-${pad(tmp.getDate())}`;
    const vals=histYears.map(y=>byYear[y]?.[mmdd]??0);
    extCum+=vals.reduce((a,b)=>a+b,0)/(vals.length||1);
    cumHistAvgExt.push(extCum);
  }
  return{labels,cumCurrentYear,cumHistAvg,cumHistAvgExt,thisYear,startYear,histYears:histYears.length,latestDate};
}

// Merged hourly normals — fetches BOTH temperature & precipitation per request
// (5 requests total, down from 10). Returns temp-shaped and rain-shaped objects.
async function getHourlyNormals(lat,lon){
  const now=new Date();
  const pad=n=>String(n).padStart(2,'0');
  const thisYear=now.getFullYear();
  const mo=now.getMonth(), dy=now.getDate();
  const fetches=[];
  for(let i=1;i<=5;i++){
    const yr=thisYear-i;
    const s=new Date(yr,mo,dy-7), e=new Date(yr,mo,dy+7);
    const p=new URLSearchParams({
      latitude:lat,longitude:lon,timezone:'auto',
      start_date:`${s.getFullYear()}-${pad(s.getMonth()+1)}-${pad(s.getDate())}`,
      end_date:`${e.getFullYear()}-${pad(e.getMonth()+1)}-${pad(e.getDate())}`,
      hourly:'temperature_2m,precipitation,relative_humidity_2m'
    });
    fetches.push(archiveFetch(`https://archive-api.open-meteo.com/v1/archive?${p}`)
      .then(r=>r.ok?r.json():null).catch(()=>null));
  }
  const results=await Promise.all(fetches);
  // Temperature accumulators
  const tSums=new Array(24).fill(0), tCounts=new Array(24).fill(0);
  // Precip accumulators
  const rSums=new Array(24).fill(0), rCounts=new Array(24).fill(0), wetCounts=new Array(24).fill(0);
  const rVals=Array.from({length:24},()=>[]);
  // Humidity accumulators
  const hSums=new Array(24).fill(0), hCounts=new Array(24).fill(0);
  results.forEach(data=>{
    if(!data?.hourly?.time) return;
    data.hourly.time.forEach((t,i)=>{
      const hr=+t.slice(11,13);
      const tv=data.hourly.temperature_2m?.[i];
      if(tv!=null){tSums[hr]+=tv;tCounts[hr]++;}
      const rv=data.hourly.precipitation?.[i];
      if(rv!=null){rSums[hr]+=rv;rCounts[hr]++;if(rv>=0.1)wetCounts[hr]++;rVals[hr].push(rv);}
      const hv=data.hourly.relative_humidity_2m?.[i];
      if(hv!=null){hSums[hr]+=hv;hCounts[hr]++;}
    });
  });
  const temp={avgByHour:tSums.map((s,h)=>tCounts[h]?s/tCounts[h]:null),yearStart:thisYear-5,yearEnd:thisYear-1};
  const rain={
    avgByHour:rSums.map((s,h)=>rCounts[h]?s/rCounts[h]:0),
    wetHourProbabilityByHour:rCounts.map((c,h)=>c?wetCounts[h]/c:0),
    p90ByHour:rVals.map(vals=>{if(!vals.length)return 0;const s=[...vals].sort((a,b)=>a-b);return s[Math.floor(s.length*0.9)]??0;}),
    yearStart:thisYear-5,yearEnd:thisYear-1
  };
  const humidity={avgByHour:hSums.map((s,h)=>hCounts[h]?s/hCounts[h]:null),yearStart:thisYear-5,yearEnd:thisYear-1};
  return{temp,rain,humidity};
}

function makeHourlyTempChart(){
  if(!fcData?.hourly?.time) return '';
  if(!hourlyHistData) return '<p class="search-msg" style="padding:20px 0">⏳ Loading hourly history…</p>';
  const hh=fcData.hourly;
  const now=new Date();
  const pad=n=>String(n).padStart(2,'0');
  const nowStr=`${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}T${pad(now.getHours())}:00`;
  const rawNow=hh.time.findIndex(t=>t>=nowStr);
  const nowIdx=rawNow<1?1:rawNow;
  // Slice to past 24h + next 24h = 48 hours total
  // (past_days:7 overrides past_hours:24 and returns far more data; clamp explicitly)
  const startIdx=Math.max(0,nowIdx-24);
  const endIdx=Math.min(hh.time.length,nowIdx+24);
  const slicedTime=hh.time.slice(startIdx,endIdx);
  const slicedTemp=hh.temperature_2m.slice(startIdx,endIdx);
  const relNow=nowIdx-startIdx;
  // Map temps and historical avg, carrying last known value over nulls
  let lastT=null, lastA=null;
  const temps=slicedTemp.map(v=>{if(v!=null)lastT=nT(v);return lastT;});
  const histLine=slicedTime.map(t=>{
    const v=hourlyHistData.avgByHour[+t.slice(11,13)];
    if(v!=null)lastA=nT(v); return lastA;
  });
  const allV=[...temps,...histLine].filter(v=>v!=null&&!isNaN(v));
  if(!allV.length) return '';
  const lo=Math.floor(Math.min(...allV))-1, hi=Math.ceil(Math.max(...allV))+1;
  const W=580,H=198,pL=46,pR=14,pT=20,pB=32;
  const cW=W-pL-pR,cH=H-pT-pB;
  const n=temps.length;
  const xf=i=>pL+i/(n-1)*cW;
  const yf=v=>pT+(1-(v-lo)/(hi-lo))*cH;
  // Y-axis ticks
  const rng=hi-lo, rawStep=rng/3;
  const mag=Math.pow(10,Math.floor(Math.log10(rawStep||1)));
  const tickStep=[1,2,5,10].map(s=>s*mag).find(s=>rng/s<=5)||Math.ceil(rawStep);
  const ticks=[];
  for(let v=Math.ceil(lo/tickStep)*tickStep;v<=hi;v+=tickStep){
    const y=yf(v).toFixed(1);
    ticks.push(`<line x1="${pL}" y1="${y}" x2="${W-pR}" y2="${y}" class="cg"/>` +
      `<text x="${pL-5}" y="${+y+4}" class="ca" text-anchor="end">${v}°</text>`);
  }
  // Now marker
  const nowX=xf(relNow).toFixed(1);
  const nowMark=`<line x1="${nowX}" y1="${pT}" x2="${nowX}" y2="${(pT+cH).toFixed(1)}" stroke="#9ba3ae" stroke-width="1" stroke-dasharray="3,3" opacity="0.7"/>` +
    `<text x="${nowX}" y="${pT-4}" font-size="8" font-weight="700" fill="#9ba3ae" text-anchor="middle">Now</text>`;
  // Polylines
  const histPts=histLine.map((v,i)=>`${xf(i).toFixed(1)},${yf(v).toFixed(1)}`).join(' ');
  const pastPts=temps.slice(0,relNow+1).map((v,i)=>`${xf(i).toFixed(1)},${yf(v).toFixed(1)}`).join(' ');
  const fcstPts=temps.slice(relNow).map((v,i)=>`${xf(relNow+i).toFixed(1)},${yf(v).toFixed(1)}`).join(' ');
  // Dots at 6-hour marks; value labels on forecast 6h marks only
  const dots=temps.map((v,i)=>{
    if(v==null) return '';
    const hr=+slicedTime[i].slice(11,13);
    const is6h=hr%6===0;
    if(!is6h) return '';
    const isPast=i<relNow;
    const cx=xf(i).toFixed(1),cy=yf(v).toFixed(1);
    const fill=isPast?'rgba(255,100,100,0.45)':'#ff7b7b';
    const r=isPast?2.5:3;
    const lbl=!isPast&&is6h?`<text x="${cx}" y="${(yf(v)-8).toFixed(1)}" class="cv cv-hot" text-anchor="middle">${Math.round(v)}°</text>`:'';
    return `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${fill}" stroke="rgba(15,12,41,.9)" stroke-width="1.5"/>${lbl}`;
  }).join('');
  // X-axis labels every 6h
  const usedX=new Set();
  const xLbls=slicedTime.map((t,i)=>{
    const hr=+t.slice(11,13);
    if(hr%6!==0) return '';
    const xKey=Math.round(xf(i));
    if(usedX.has(xKey)) return ''; usedX.add(xKey);
    const lbl=hr===0?'Midnight':hr===12?'Noon':hr<12?`${hr}am`:`${hr-12}pm`;
    return `<text x="${xf(i).toFixed(1)}" y="${H-4}" class="ca" text-anchor="middle">${lbl}</text>`;
  }).join('');
  // End labels (replacing legend) — separate vertically if lines converge
  const endX=(xf(n-1)+5).toFixed(1);
  const endTmpY=temps[n-1]!=null?yf(temps[n-1]):null;
  const endAvgY=histLine[n-1]!=null?yf(histLine[n-1]):null;
  let _heTmp=endTmpY, _heAvg=endAvgY;
  if(_heTmp!=null&&_heAvg!=null){
    const _heSep=_heTmp-_heAvg;
    if(Math.abs(_heSep)<13){const bump=(13-Math.abs(_heSep))/2+1;_heTmp+=_heSep>=0?bump:-bump;_heAvg+=_heSep>=0?-bump:bump;}
  }
  const endLbls=[
    _heTmp!=null?`<text x="${endX}" y="${(_heTmp+4).toFixed(1)}" font-size="8.5" font-weight="700" fill="#c0392b">Forecast</text>`:'',
    _heAvg!=null?`<text x="${endX}" y="${(_heAvg+4).toFixed(1)}" font-size="8.5" fill="#9ba3ae">5-yr avg</text>`:''
  ].join('');
  _hourlyData={temps,histLine,pL,cW,n,nowIdx:relNow,times:slicedTime};
  return `<svg viewBox="0 0 ${W} ${H}" class="wc-svg" data-chart="hourly">
    ${ticks.join('')}
    ${nowMark}
    <line id="ttg-hourly" x1="${pL}" y1="${pT}" x2="${pL}" y2="${(pT+cH).toFixed(1)}" stroke="rgba(255,255,255,.18)" stroke-width="1" stroke-dasharray="3,3" visibility="hidden"/>
    <polyline points="${histPts}" class="cl-ytd-hist"/>
    <polyline points="${pastPts}" class="cl cl-hot" stroke-dasharray="5,4" opacity="0.55"/>
    <polyline points="${fcstPts}" class="cl cl-hot"/>
    ${dots}
    ${endLbls}
    ${xLbls}
  </svg>`;
}

function classifyRain(forecastMm,histMeanMm,p90Mm){
  if(forecastMm<0.1) return histMeanMm>=1?{text:'Dry',color:'#2980b9'}:{text:'Dry',color:'#9ba3ae'};
  if(p90Mm>0&&forecastMm>=p90Mm) return{text:'Heavy',color:'#c0392b'};
  if(forecastMm>histMeanMm*1.5&&forecastMm-histMeanMm>=1) return{text:'Wetter',color:'#2980b9'};
  if(histMeanMm>0.5&&forecastMm<histMeanMm*0.5) return{text:'Drier',color:'#9ba3ae'};
  return{text:'Near avg',color:'#6c7079'};
}

function makeHourlyRainChart(){
  if(!fcData?.hourly?.time) return '';
  const hh=fcData.hourly;
  const now=new Date();
  const pad=n=>String(n).padStart(2,'0');
  const nowStr=`${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}T${pad(now.getHours())}:00`;
  const rawNow=hh.time.findIndex(t=>t>=nowStr);
  const nowIdx=rawNow<1?1:rawNow;
  // Past 24h actual + next 24h forecast = 48h total, same window as temp chart
  const startIdx=Math.max(0,nowIdx-24);
  const endIdx=Math.min(hh.time.length,nowIdx+24);
  const times=hh.time.slice(startIdx,endIdx);
  const precip=(hh.precipitation||[]).slice(startIdx,endIdx).map(v=>v??0);
  const prob=(hh.precipitation_probability||[]).slice(startIdx,endIdx);
  const n=times.length;
  if(!n) return '';
  const relNow=nowIdx-startIdx;
  const yMax=Math.max(...precip,0.5)*1.25;
  const W=580,H=185,pL=46,pR=14,pT=20,pB=36;
  const cW=W-pL-pR,cH=H-pT-pB;
  const slotW=cW/n;
  const barW=Math.max(2,slotW*0.72);
  const xCx=i=>pL+(i+0.5)*slotW;
  const xBL=i=>pL+i*slotW+(slotW-barW)/2;
  const yf=v=>pT+(1-Math.min(v,yMax)/yMax)*cH;
  // Y ticks
  const niceSteps=imp?[0.01,0.05,0.1,0.25,0.5,1,2]:[0.1,0.2,0.5,1,2,5,10];
  const rawStep=yMax/4;
  const tickStep=niceSteps.find(s=>s>=rawStep*0.7)||Math.ceil(rawStep*10)/10;
  const fmtY=v=>imp?(v<0.1?v.toFixed(2):v.toFixed(1))+'"':v<1?v.toFixed(1)+'mm':Math.round(v)+'mm';
  const ticks=[];
  for(let v=0;v<=yMax*1.05;v+=tickStep){
    const y=yf(v).toFixed(1);
    ticks.push(`<line x1="${pL}" y1="${y}" x2="${W-pR}" y2="${y}" class="cg"/>` +
      `<text x="${pL-5}" y="${+y+4}" class="ca" text-anchor="end">${fmtY(v)}</text>`);
  }
  // "Now" divider in the middle, same as temp chart
  const nowX=xCx(relNow).toFixed(1);
  const nowMark=`<line x1="${nowX}" y1="${pT}" x2="${nowX}" y2="${(pT+cH).toFixed(1)}" stroke="#9ba3ae" stroke-width="1" stroke-dasharray="3,3" opacity="0.7"/>` +
    `<text x="${nowX}" y="${pT-4}" font-size="8" font-weight="700" fill="#9ba3ae" text-anchor="middle">Now</text>`;
  // Bars — past faded, forecast solid
  const bars=precip.map((v,i)=>{
    const bx=xBL(i).toFixed(1);
    const bH=Math.max(0,yf(0)-yf(v));
    if(bH<0.5) return '';
    const fill=i<relNow?'rgba(102,126,234,0.3)':'rgba(102,126,234,0.8)';
    return `<rect x="${bx}" y="${yf(v).toFixed(1)}" width="${barW.toFixed(1)}" height="${bH.toFixed(1)}" fill="${fill}" rx="1"/>`;
  }).join('');
  // Probability text above forecast bars only (>=20%)
  const probLbls=prob.map((p,i)=>{
    if(i<relNow||p==null||p<20) return '';
    const ty=(yf(precip[i]??0)-4).toFixed(1);
    return `<text x="${xCx(i).toFixed(1)}" y="${ty}" font-size="7" fill="rgba(41,128,185,0.85)" text-anchor="middle">${p}%</text>`;
  }).join('');
  // X labels every 6h
  const usedX=new Set();
  const xLbls=times.map((t,i)=>{
    const hr=+t.slice(11,13);
    if(hr%6!==0) return '';
    const xKey=Math.round(xCx(i)); if(usedX.has(xKey)) return ''; usedX.add(xKey);
    const lbl=hr===0?'Midnight':hr===12?'Noon':hr<12?`${hr}am`:`${hr-12}pm`;
    return `<text x="${xCx(i).toFixed(1)}" y="${H-6}" class="ca" text-anchor="middle">${lbl}</text>`;
  }).join('');
  _hourlyRainData={precip,prob,pL,slotW,n,relNow,times};
  return `<svg viewBox="0 0 ${W} ${H}" class="wc-svg" data-chart="hourly-rain">
    ${ticks.join('')}
    ${nowMark}
    <line id="ttg-hourly-rain" x1="${pL}" y1="${pT}" x2="${pL}" y2="${(pT+cH).toFixed(1)}" stroke="rgba(255,255,255,.18)" stroke-width="1" stroke-dasharray="3,3" visibility="hidden"/>
    ${bars}
    ${xLbls}
  </svg>`;
}

function makeDailyRainChart(){
  if(!fcData?.daily?.time) return '';
  const daily=fcData.daily;
  // With past_days:7, index 7 is today — all 14 days are already in fcData
  const todayIdx=Math.min(7,daily.time.length-1);
  const n=daily.time.length; // 14
  const precip=(daily.precipitation_sum||[]).map(v=>v??0);
  const probs=daily.precipitation_probability_max||[];
  const W=580,H=185,pL=46,pR=14,pT=20,pB=38;
  const cW=W-pL-pR,cH=H-pT-pB;
  const yMax=Math.max(...precip,1)*1.2;
  const slotW=cW/n;
  const barW=slotW*0.6;
  const xCx=i=>pL+(i+0.5)*slotW;
  const xBL=i=>pL+i*slotW+(slotW-barW)/2;
  const yf=v=>pT+(1-Math.min(v,yMax)/yMax)*cH;
  // Y ticks
  const niceSteps=imp?[0.05,0.1,0.25,0.5,1,2,5]:[0.5,1,2,5,10,20,50];
  const rawStep=yMax/4;
  const tickStep=niceSteps.find(s=>s>=rawStep*0.7)||1;
  const fmtY=v=>imp?(v<0.1?v.toFixed(2):v.toFixed(1))+'"':(v<1?v.toFixed(1):Math.round(v))+'mm';
  const fmtMm=v=>imp?(v<0.1?'—':v.toFixed(2)+'"'):(v<0.1?'—':v.toFixed(1)+'mm');
  const ticks=[];
  for(let v=0;v<=yMax*1.05;v+=tickStep){
    const y=yf(v).toFixed(1);
    ticks.push(`<line x1="${pL}" y1="${y}" x2="${W-pR}" y2="${y}" class="cg"/>` +
      `<text x="${pL-5}" y="${+y+4}" class="ca" text-anchor="end">${fmtY(v)}</text>`);
  }
  // Today divider
  const todayX=xCx(todayIdx).toFixed(1);
  const todayMark=`<line x1="${todayX}" y1="${pT}" x2="${todayX}" y2="${(pT+cH).toFixed(1)}" stroke="#9ba3ae" stroke-width="1" stroke-dasharray="3,3" opacity="0.7"/>` +
    `<text x="${todayX}" y="${pT-4}" font-size="8" font-weight="700" fill="#9ba3ae" text-anchor="middle">Today</text>`;
  // Bars and labels
  const els=daily.time.map((dateStr,i)=>{
    const mm=precip[i], cx=xCx(i).toFixed(1), bx=xBL(i).toFixed(1);
    const bH=Math.max(0,yf(0)-yf(mm));
    const isPast=i<todayIdx;
    const fill=isPast?'rgba(102,126,234,0.3)':'rgba(102,126,234,0.8)';
    const bar=bH>0.5?`<rect x="${bx}" y="${yf(mm).toFixed(1)}" width="${barW.toFixed(1)}" height="${bH.toFixed(1)}" fill="${fill}" rx="2"/>`:''
    const valLbl=mm>=0.1?`<text x="${cx}" y="${(yf(mm)-5).toFixed(1)}" font-size="8" fill="rgba(102,126,234,0.9)" text-anchor="middle">${fmtMm(mm)}</text>`:''
    const isToday=i===todayIdx;
    const dayLbl=isToday?'Today':fDay(dateStr);
    const prob=probs[i];
    const probLbl=!isPast&&prob!=null?`<text x="${cx}" y="${H-8}" font-size="7.5" fill="rgba(41,128,185,0.8)" text-anchor="middle">${prob}%</text>`:'';
    return bar+valLbl+
      `<text x="${cx}" y="${H-22}" class="ca" font-weight="${isToday?700:400}" text-anchor="middle">${dayLbl}</text>`+
      probLbl;
  }).join('');
  _dailyRainData={dates:daily.time,precip,probs,pL,slotW,n,todayIdx};
  return `<svg viewBox="0 0 ${W} ${H}" class="wc-svg" data-chart="daily-rain">
    ${ticks.join('')}

    ${els}

}

// ── Humidity charts ────────────────────────────────────
function makeHourlyHumidChart(){
  if(!fcData?.hourly?.time) return '';
  if(!hourlyHumidData) return '<p class="search-msg" style="padding:20px 0">⏳ Loading humidity history…</p>';
  const hh=fcData.hourly;
  const now=new Date();
  const pad=n=>String(n).padStart(2,'0');
  const nowStr=`${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}T${pad(now.getHours())}:00`;
  const rawNow=hh.time.findIndex(t=>t>=nowStr);
  const nowIdx=rawNow<1?1:rawNow;
  const startIdx=Math.max(0,nowIdx-24), endIdx=Math.min(hh.time.length,nowIdx+24);
  const times=hh.time.slice(startIdx,endIdx);
  const humid=(hh.relative_humidity_2m||[]).slice(startIdx,endIdx);
  const n=times.length; if(!n) return '';
  const relNow=nowIdx-startIdx;
  const histLine=times.map(t=>hourlyHumidData.avgByHour[+t.slice(11,13)]??null);
  // carry forward any nulls
  let lastH=null, lastA=null;
  const hVals=humid.map(v=>{if(v!=null)lastH=v; return lastH;});
  const aVals=histLine.map(v=>{if(v!=null)lastA=v; return lastA;});
  const allV=[...hVals,...aVals].filter(v=>v!=null);
  if(!allV.length) return '';
  const lo=Math.max(0,Math.floor(Math.min(...allV)/10)*10-10);
  const hi=Math.min(100,Math.ceil(Math.max(...allV)/10)*10+5);
  const W=580,H=185,pL=46,pR=14,pT=20,pB=32;
  const cW=W-pL-pR,cH=H-pT-pB;
  const xf=i=>pL+i/(n-1)*cW;
  const yf=v=>pT+(1-(v-lo)/(hi-lo))*cH;
  // Y ticks every 10%
  const ticks=[];
  for(let v=Math.ceil(lo/10)*10;v<=hi;v+=10){
    const y=yf(v).toFixed(1);
    ticks.push(`<line x1="${pL}" y1="${y}" x2="${W-pR}" y2="${y}" class="cg"/>` +
      `<text x="${pL-5}" y="${+y+4}" class="ca" text-anchor="end">${v}%</text>`);
  }
  // Now divider
  const nowX=xf(relNow).toFixed(1);
  const nowMark=`<line x1="${nowX}" y1="${pT}" x2="${nowX}" y2="${(pT+cH).toFixed(1)}" stroke="#9ba3ae" stroke-width="1" stroke-dasharray="3,3" opacity="0.7"/>` +
    `<text x="${nowX}" y="${pT-4}" font-size="8" font-weight="700" fill="#9ba3ae" text-anchor="middle">Now</text>`;
  // Polylines
  const histPts=aVals.map((v,i)=>v!=null?`${xf(i).toFixed(1)},${yf(v).toFixed(1)}`:null).filter(Boolean).join(' ');
  const pastPts=hVals.slice(0,relNow+1).map((v,i)=>v!=null?`${xf(i).toFixed(1)},${yf(v).toFixed(1)}`:null).filter(Boolean).join(' ');
  const fcstPts=hVals.slice(relNow).map((v,i)=>v!=null?`${xf(relNow+i).toFixed(1)},${yf(v).toFixed(1)}`:null).filter(Boolean).join(' ');
  // End labels
  const endX=(xf(n-1)+5).toFixed(1);
  const eFC=hVals[n-1], eHI=aVals[n-1];
  let yFC=eFC!=null?yf(eFC):null, yHI=eHI!=null?yf(eHI):null;
  if(yFC!=null&&yHI!=null&&Math.abs(yFC-yHI)<12){const b=(12-Math.abs(yFC-yHI))/2+1;yFC+=(yFC>=yHI?b:-b);yHI+=(yHI>yFC?b:-b);}
  const endLbls=(yFC!=null?`<text x="${endX}" y="${(yFC+4).toFixed(1)}" font-size="8.5" font-weight="700" fill="#4bc6b9">Forecast</text>`:'')+
    (yHI!=null?`<text x="${endX}" y="${(yHI+4).toFixed(1)}" font-size="8.5" fill="#9ba3ae">5-yr avg</text>`:'');
  // X labels every 6h
  const usedX=new Set();
  const xLbls=times.map((t,i)=>{
    const hr=+t.slice(11,13); if(hr%6!==0) return '';
    const xk=Math.round(xf(i)); if(usedX.has(xk))return ''; usedX.add(xk);
    const lbl=hr===0?'Midnight':hr===12?'Noon':hr<12?`${hr}am`:`${hr-12}pm`;
    return `<text x="${xf(i).toFixed(1)}" y="${H-4}" class="ca" text-anchor="middle">${lbl}</text>`;
  }).join('');
  _hourlyHumidData={hVals,aVals,pL,cW,n,relNow,times};
  return `<svg viewBox="0 0 ${W} ${H}" class="wc-svg" data-chart="hourly-humid">
    ${ticks.join('')}
    ${nowMark}
    <line id="ttg-hourly-humid" x1="${pL}" y1="${pT}" x2="${pL}" y2="${(pT+cH).toFixed(1)}" stroke="rgba(255,255,255,.18)" stroke-width="1" stroke-dasharray="3,3" visibility="hidden"/>
    <polyline points="${histPts}" class="cl-ytd-hist"/>
    <polyline points="${pastPts}" fill="none" stroke="rgba(75,198,185,0.5)" stroke-width="2" stroke-dasharray="5,4" stroke-linejoin="round" stroke-linecap="round"/>
    <polyline points="${fcstPts}" fill="none" stroke="#4bc6b9" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
    ${endLbls}
    ${xLbls}
  </svg>`;
}

    `<text x="${todayX}" y="${pT-4}" font-size="8" font-weight="700" fill="#9ba3ae" text-anchor="middle">Today</text>`;

  const histY=histMean!=null?yf(histMean).toFixed(1):null;

    ${els}

// ── Climatology ────────────────────────────────────────
async function getClimatology(lat,lon){
  // ONE archive request fetches 10 years of daily temp+precip. From this single
  // dataset we derive: monthly climate normals, the 14-day temp band, and daily
  // rain normals — avoiding ~10 extra requests that previously triggered rate limits.
  const thisYear=new Date().getFullYear();
  const startYear=thisYear-10;
  const p=new URLSearchParams({
    latitude:lat,longitude:lon,timezone:'auto',
    start_date:`${startYear}-01-01`,
    end_date:`${thisYear-1}-12-31`,
    daily:'temperature_2m_max,temperature_2m_min,precipitation_sum'
  });
  const r=await archiveFetch(`https://archive-api.open-meteo.com/v1/archive?${p}`);
  if(!r.ok) throw new Error('Climate fetch failed');
  const data=await r.json();
  if(!data.daily?.time) return null;
  const arrAvg=arr=>arr.length?arr.reduce((a,b)=>a+b,0)/arr.length:null;
  // Monthly aggregation for the climate chart
  const byMonthYear={};
  // Per-calendar-day lookups (MM-DD) for deriving rolling temp & rain normals
  const byMMDD={}; // {mmdd:{maxes:[],mins:[],rains:[]}}
  data.daily.time.forEach((t,i)=>{
    const mx=data.daily.temperature_2m_max[i];
    const mn=data.daily.temperature_2m_min[i];
    const rn=data.daily.precipitation_sum[i];
    const mKey=t.slice(0,7), mmdd=t.slice(5);
    if(!byMonthYear[mKey]) byMonthYear[mKey]={tMax:[],tMin:[],rain:0};
    if(mx!=null) byMonthYear[mKey].tMax.push(mx);
    if(mn!=null) byMonthYear[mKey].tMin.push(mn);
    if(rn!=null) byMonthYear[mKey].rain+=rn;
    if(!byMMDD[mmdd]) byMMDD[mmdd]={maxes:[],mins:[],rains:[]};
    if(mx!=null) byMMDD[mmdd].maxes.push(mx);
    if(mn!=null) byMMDD[mmdd].mins.push(mn);
    if(rn!=null) byMMDD[mmdd].rains.push(rn);
  });
  const byMonth=Array.from({length:12},()=>({tMax:[],tMin:[],rain:[]}));
  Object.entries(byMonthYear).forEach(([key,v])=>{
    const mo=+key.slice(5,7)-1;
    if(v.tMax.length) byMonth[mo].tMax.push(arrAvg(v.tMax));
    if(v.tMin.length) byMonth[mo].tMin.push(arrAvg(v.tMin));
    byMonth[mo].rain.push(v.rain);
  });
  return{
    months:byMonth.map(m=>({tMax:arrAvg(m.tMax),tMin:arrAvg(m.tMin),rain:arrAvg(m.rain)})),
    byMMDD,
    yearStart:startYear,yearEnd:thisYear-1
  };
}

// Calendar-day distance between two MM-DD strings, year-wrap aware
function _mmddDist(a,b){
  const da=new Date(2020,+a.slice(0,2)-1,+a.slice(3));
  const db=new Date(2020,+b.slice(0,2)-1,+b.slice(3));
  let d=Math.round((da-db)/86400000);
  if(d>182) d-=365; if(d<-182) d+=365;
  return Math.abs(d);
}

// Derive 14-day temp band (today-7 … today+6) from climatology's daily lookups.
// Replaces the old getHistorical (which fired 5 separate archive requests).
function deriveTempBand(climate){
  if(!climate?.byMMDD) return null;
  const now=new Date(), pad=n=>String(n).padStart(2,'0');
  const thisYear=now.getFullYear(), mo=now.getMonth(), dy=now.getDate();
  const arrAvg=arr=>arr.length?arr.reduce((a,b)=>a+b,0)/arr.length:null;
  const entries=Object.entries(climate.byMMDD);
  const dailyAvg=[];
  for(let i=-7;i<=6;i++){
    const tmp=new Date(thisYear,mo,dy+i);
    const mmdd=`${pad(tmp.getMonth()+1)}-${pad(tmp.getDate())}`;
    const maxes=[],mins=[];
    entries.forEach(([am,v])=>{
      if(_mmddDist(mmdd,am)<=3){maxes.push(...v.maxes);mins.push(...v.mins);}
    });
    dailyAvg.push({tMax:arrAvg(maxes),tMin:arrAvg(mins)});
  }
  return{
    dailyAvg,
    tMax:dailyAvg[7]?.tMax??null, tMin:dailyAvg[7]?.tMin??null,
    precip:null, wind:null, nextMonth:null,
    month:now.toLocaleString('en-US',{month:'long'}),
    histYearStart:climate.yearStart, histYearEnd:climate.yearEnd
  };
}

// Derive per-forecast-day rain normals from climatology's daily lookups.
// Replaces the old getDailyRainHistorical (which fired 5 separate archive requests).
function deriveDailyRain(climate){
  if(!climate?.byMMDD||!fcData?.daily) return null;
  const t0=Math.min(7,fcData.daily.time.length-1);
  const fcDates=fcData.daily.time.slice(t0,t0+7);
  const entries=Object.entries(climate.byMMDD);
  const arrAvg=arr=>arr.length?arr.reduce((a,b)=>a+b,0)/arr.length:0;
  const arrMedian=arr=>{if(!arr.length)return 0;const s=[...arr].sort((a,b)=>a-b),m=Math.floor(s.length/2);return s.length%2?s[m]:(s[m-1]+s[m])/2;};
  const arrP90=arr=>{if(!arr.length)return 0;const s=[...arr].sort((a,b)=>a-b);return s[Math.floor(s.length*0.9)]??0;};
  return fcDates.map((dateStr,idx)=>{
    const mmdd=dateStr.slice(5);
    const vals=[];
    entries.forEach(([am,v])=>{ if(_mmddDist(mmdd,am)<=3) vals.push(...v.rains); });
    return{
      date:dateStr,
      forecastMm:fcData.daily.precipitation_sum[t0+idx]??0,
      probabilityMax:fcData.daily.precipitation_probability_max[t0+idx]??null,
      histMeanMm:arrAvg(vals),
      histMedianMm:arrMedian(vals),
      wetDayProbability:vals.length?vals.filter(v=>v>=0.1).length/vals.length:0,
      p90Mm:arrP90(vals)
    };
  });
}

function makeClimateChart(){
  if(!climatologyData) return '<p class="search-msg" style="padding:20px 0">⏳ Loading climate data…</p>';
  const{months:data,yearStart,yearEnd}=climatologyData;
  const MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const curMo=new Date().getMonth();
  const n=12;
  const W=580,H=200,pL=46,pR=54,pT=24,pB=28;
  const cW=W-pL-pR,cH=H-pT-pB;
  // Temperature axis (left) — store in °C, display in user units
  const tMaxes=data.map(d=>d.tMax).filter(v=>v!=null);
  const tMins=data.map(d=>d.tMin).filter(v=>v!=null);
  const tLoC=Math.min(...tMins)-2, tHiC=Math.max(...tMaxes)+2;
  const dispLoT=nT(tLoC), dispHiT=nT(tHiC);
  const yfT=v=>pT+(1-(nT(v)-dispLoT)/(dispHiT-dispLoT))*cH;
  // Rainfall axis (right)
  const rains=data.map(d=>d.rain).filter(v=>v!=null);
  const rMaxMm=Math.max(...rains,imp?25.4:10)*1.15;
  const dispR=v=>imp?(v*0.0393701).toFixed(1)+'"':Math.round(v)+'mm';
  const yfR=v=>pT+(1-v/rMaxMm)*cH;
  const slotW=cW/n;
  const barW=slotW*0.65;
  const xCx=i=>pL+(i+0.5)*slotW;
  const xBL=i=>pL+i*slotW+(slotW-barW)/2;
  // Left (temp) axis ticks
  const tRange=dispHiT-dispLoT;
  const tStepOpts=imp?[5,10,20]:[2,5,10,20];
  const tStep=tStepOpts.find(s=>tRange/s>=2&&tRange/s<=7)||10;
  const tTicks=[];
  for(let v=Math.ceil(dispLoT/tStep)*tStep;v<=dispHiT;v+=tStep){
    const y=(pT+(1-(v-dispLoT)/(dispHiT-dispLoT))*cH).toFixed(1);
    tTicks.push(`<line x1="${pL}" y1="${y}" x2="${W-pR}" y2="${y}" class="cg"/>` +
      `<text x="${pL-5}" y="${+y+4}" class="ca" text-anchor="end">${Math.round(v)}°</text>`);
  }
  // Right (rain) axis ticks
  const rStepOpts=imp?[0.5,1,2,5]:[10,20,50,100,200];
  const rStep=rStepOpts.find(s=>rMaxMm/s>=2&&rMaxMm/s<=6)||(imp?1:20);
  const rTicks=[];
  for(let v=0;v<=rMaxMm;v+=rStep){
    const y=yfR(v).toFixed(1);
    rTicks.push(`<text x="${W-pR+6}" y="${+y+4}" class="ca" text-anchor="start">${dispR(v)}</text>`);
  }
  // Current month highlight
  const curHL=`<rect x="${xBL(curMo).toFixed(1)}" y="${pT}" width="${barW.toFixed(1)}" height="${cH}" fill="rgba(255,200,50,0.09)" rx="1"/>`;
  // Rainfall bars
  const bars=data.map((d,i)=>{
    if(d.rain==null) return '';
    const bH=Math.max(0,yfR(0)-yfR(d.rain));
    if(bH<0.5) return '';
    return `<rect x="${xBL(i).toFixed(1)}" y="${yfR(d.rain).toFixed(1)}" width="${barW.toFixed(1)}" height="${bH.toFixed(1)}" fill="rgba(102,126,234,0.45)" rx="2"/>`;
  }).join('');
  // Temperature polylines
  const hotPts=data.map((d,i)=>d.tMax!=null?`${xCx(i).toFixed(1)},${yfT(d.tMax).toFixed(1)}`:null).filter(Boolean).join(' ');
  const coldPts=data.map((d,i)=>d.tMin!=null?`${xCx(i).toFixed(1)},${yfT(d.tMin).toFixed(1)}`:null).filter(Boolean).join(' ');
  // Dots at each month
  const dots=data.map((d,i)=>{
    const cx=xCx(i).toFixed(1), r=i===curMo?4:3;
    return (d.tMax!=null?`<circle cx="${cx}" cy="${yfT(d.tMax).toFixed(1)}" r="${r}" fill="#ff7b7b" stroke="rgba(15,12,41,.9)" stroke-width="1.5"/>`:'') +
           (d.tMin!=null?`<circle cx="${cx}" cy="${yfT(d.tMin).toFixed(1)}" r="${r}" fill="#74c0fc" stroke="rgba(15,12,41,.9)" stroke-width="1.5"/>`:'');
  }).join('');
  // End-of-line labels
  const endX=(xCx(11)+5).toFixed(1);
  const lastHot=data[11]?.tMax, lastCold=data[11]?.tMin;
  const endLbls=(lastHot!=null?`<text x="${endX}" y="${(yfT(lastHot)+4).toFixed(1)}" font-size="8.5" font-weight="600" fill="#c0392b">High</text>`:'')+
    (lastCold!=null?`<text x="${endX}" y="${(yfT(lastCold)+4).toFixed(1)}" font-size="8.5" font-weight="600" fill="#4a9eda">Low</text>`:'');
  // X axis
  const xLbls=MON.map((m,i)=>
    `<text x="${xCx(i).toFixed(1)}" y="${H-6}" class="ca" text-anchor="middle" font-weight="${i===curMo?700:400}">${m}</text>`
  ).join('');
  _climateData={data,pL,slotW,n};
  return `<svg viewBox="0 0 ${W} ${H}" class="wc-svg" data-chart="climate">
    ${tTicks.join('')}
    ${rTicks.join('')}
    ${curHL}
    ${bars}
    <polyline points="${hotPts}" fill="none" stroke="#ff7b7b" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
    <polyline points="${coldPts}" fill="none" stroke="#74c0fc" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
    ${dots}
    ${endLbls}
    ${xLbls}
  </svg>`;
}
