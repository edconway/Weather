<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="app">
  <div id="tt" class="tt hidden"></div>
  <div id="loading" class="loading">
    <div class="spinner"></div>
    <p id="load-msg">Getting your location…</p>
  </div>
  <div id="error" class="error hidden">
    <div class="error-icon">⚠️</div>
    <h2>Couldn't load weather</h2>
    <p id="err-msg">Something went wrong.</p>
    <button class="btn" onclick="init()">Try Again</button>
  </div>
  <div id="main" class="hidden">
    <div class="hdr-wrap">
      <div id="app-hdr"></div>
      <div id="search-drop" class="search-drop hidden"></div>
    </div>
    <div id="content"></div>
  </div>
</div>

<script src="app.js"></script>
<script src="charts.js"></script>
<script src="search.js"></script>
</body>
</html>
